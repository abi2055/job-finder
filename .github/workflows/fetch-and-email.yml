name: Fetch and Email Jobs

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  fetch-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project
        run: python -m pip install -e .

      - name: Fetch jobs and send email
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
        run: python -m job_notifier.notify_jobs --output data/raw_jobs.json --preferences notification_preferences.json --top-jobs 25 --attach-raw

      - name: Upload raw job data artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-jobs
          path: data/raw_jobs.json
          retention-days: 7
